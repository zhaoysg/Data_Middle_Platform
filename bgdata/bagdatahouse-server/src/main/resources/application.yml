# 数据中台工具 - 应用配置
spring:
  application:
    name: bagdatahouse-server
    
  # 开发环境配置
  profiles:
    active: dev
    
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
      
  # 关闭Spring Security默认行为（我们使用自定义JWT）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
  
  # 数据源配置
  datasource:
    # 平台自身数据库（MySQL）
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:mysql://49.232.153.150:3366/bagdatahouse?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&cachePrepStmts=true
    username: root
    password: sdfwer@re3f
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Druid连接池配置（性能优化版）
    druid:
      # 初始化连接数
      initial-size: 10
      # 最小空闲连接数
      min-idle: 10
      # 最大活跃连接数（根据服务器配置调整）
      max-active: 50
      # 获取连接最大等待时间（毫秒）
      max-wait: 60000
      # 连接检测间隔（毫秒）
      time-between-eviction-runs-millis: 60000
      # 最小生存时间（毫秒）
      min-evictable-idle-time-millis: 300000
      # 连接有效性检测SQL
      validation-query: SELECT 1
      # 空闲时检测
      test-while-idle: true
      # 获取时检测（生产环境建议关闭）
      test-on-borrow: false
      # 归还时检测
      test-on-return: false
      # 启用PSCache（PreparedStatement缓存）
      pool-prepared-statements: true
      # 每个连接PSCache大小
      max-pool-prepared-statement-per-connection-size: 50
      # 启用SQL统计监控（不使用 wall：平台自身 SQL 由 Flyway/代码固定管理，无需防火墙；业务库走 DynamicDataSourceManager）
      filters: stat,slf4j
      # 连接泄漏检测
      remove-abandoned: true
      remove-abandoned-timeout: 1800
      log-abandoned: true
      # 连接属性配置
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=3000
  
  # Redis配置
  data:
    redis:
      host: 49.232.153.150
      port: 6679
      password: ruoyi123
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          # 最大活跃连接数
          max-active: 16
          # 最大空闲连接数
          max-idle: 8
          # 最小空闲连接数
          min-idle: 4
          # 获取连接最大等待时间（毫秒）
          max-wait: 5000ms
        # 关闭超时时间
        shutdown-timeout: 100ms
  # 缓存默认过期时间（秒）
  cache:
    default-ttl: 3600
  
  # Flyway数据库版本管理（已禁用，使用已有数据库）
  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: true

# 服务器配置（性能优化版）
server:
  port: 8080
  servlet:
    context-path: /api
  # Tomcat 性能优化配置
  tomcat:
    # 最大工作线程数
    max-threads: 400
    # 最小工作线程数
    min-spare-threads: 20
    # 最大连接数
    max-connections: 10000
    # 连接超时时间
    connection-timeout: 60000
    # 启用NIO
    protocol-header: org.apache.coyote.http11.Http11NioProtocol
    # 最大待处理连接队列
    accept-count: 200
    # 启用压缩
    compression:
      enabled: true
      min-response-size: 1024
      compressionMimeTypes: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# 数据质量（DQC）业务参数
bagdatahouse:
  dqc:
    # 规则表达式「预览查询」：JDBC 语句超时（秒）
    sql-preview-query-timeout-seconds: 15
    # 预览结果最大行数（防止大结果集拖垮连接）
    sql-preview-max-rows: 100

# MyBatis-Plus配置（性能优化版）
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.bagdatahouse.core.entity
  configuration:
    # 下划线转驼峰
    map-underscore-to-camel-case: true
    # 禁用二级缓存
    cache-enabled: false
    # 日志实现
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    # 启用懒加载
    lazyLoadingEnabled: true
    # 积极加载（按需加载）
    aggressiveLazyLoading: false
    # 启用自动映射
    autoMappingBehavior: PARTIAL
    # 未知列映射行为
    autoMappingUnknownColumnBehavior: WARNING
    # 返回map时控制映射
    mapUnderscoreToCamelCase: true
    # JDBC类型for NULL
    jdbcTypeForNull: NULL
  # SQL性能优化配置
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 开启字段自动填充
      insertFill:
        createTime: now
        updateTime: now
      updateFill:
        updateTime: now
  # 性能优化：开启执行分析插件
  sql-parser-cache: true

# XXL-Job配置
xxl:
  job:
    admin:
      addresses: http://localhost:8088/xxl-job-admin
    executor:
      appname: bagdatahouse-executor
      port: 9999
      logpath: /data/applogs/xxl-job/jobhandler
      logretentiondays: 30
    access-token: bagdatahouse-token

# Knife4j文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
  openapi:
    title: 数据中台工具 API文档
    description: 整合阿里DataWorks和华为DataArts Studio的最佳实践
    version: 1.0.0
    contact:
      name: bagdatahouse
      email: admin@bagdatahouse.com
    group:
      1:
        name: 系统管理
        packages: com.bagdatahouse.server.controller.system
      2:
        name: 数据质量
        packages: com.bagdatahouse.server.controller.dqc
      3:
        name: 数据探查
        packages: com.bagdatahouse.server.controller.dprofile
      4:
        name: 数据监控
        packages: com.bagdatahouse.server.controller.monitor
      5:
        name: 数据治理
        packages: com.bagdatahouse.server.controller.gov

# Spring Boot Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# JWT配置
jwt:
  secret: bagdatahouse-jwt-secret-key-2024-change-in-production
  expiration: 86400000  # 24小时
  header: Authorization
  prefix: Bearer

# 日志配置
logging:
  level:
    root: INFO
    com.bagdatahouse: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/bagdatahouse.log
    max-size: 100MB
    max-history: 30
